name: Deploy to ECR

on:
  push:
    branches: [main]
    
permissions:
  id-token: write # This is required for requesting the JWT
  contents: read  # This is required for actions/checkout
  
jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: enable corepack
        run: corepack enable

      - name: install dependencies
        run: yarn install --frozen-lockfile

      - name: test
        run: yarn test --runInBand

      - name: graphql generated artifacts
        run: |
          yarn graphql-codegen --config codegen.ci.yml
          yarn prettier --write ./lib/generated/graphql.tsx
          git diff --exit-code ./lib/generated/graphql.tsx

      - name: typecheck
        run: yarn tsc --noEmit

      - name: lint
        run: yarn lint

      - name: build
        run: yarn build

  build:
    name: Build docker image
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::317555312301:role/githubaction
          aws-region: us-east-1

      - name: login to AWS ECR
        id: login-ecr-public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: build, tag, and push image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr-public.outputs.registry }}
          REGISTRY_ALIAS: g0x0v6d0
          REPOSITORY: ohtk-ms
          IMAGE_TAG: latest
          IMAGE_TAG_SHA: ${{ github.sha }}
        run: |
          docker build \
            -t $REGISTRY/$REGISTRY_ALIAS/$REPOSITORY:$IMAGE_TAG \
            -t $REGISTRY/$REGISTRY_ALIAS/$REPOSITORY:$IMAGE_TAG_SHA \
            .
          docker push $REGISTRY/$REGISTRY_ALIAS/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REGISTRY_ALIAS/$REPOSITORY:$IMAGE_TAG_SHA
