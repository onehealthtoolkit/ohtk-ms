fragment RiskAssessmentFields on RiskAssessmentProjectionType {
  id
  level
  source
  score
  factors
  evaluatorVersion
  externalAssessmentId
  isCurrent
  createdAt
  createdBy {
    id
    username
    firstName
    lastName
  }
}

query Reports(
  $limit: Int!
  $offset: Int!
  $fromDate: DateTime
  $throughDate: DateTime
  $authorities: [ID]
  $reportTypes: [UUID]
  $testFlag: Boolean
  $includeChildAuthorities: Boolean
  $currentRiskLevels: String
) {
  incidentReports(
    createdAt_Gte: $fromDate
    createdAt_Lte: $throughDate
    relevantAuthorities_Id_In: $authorities
    reportType_Id_In: $reportTypes
    testFlag: $testFlag
    includeChildAuthorities: $includeChildAuthorities
    currentRiskLevels: $currentRiskLevels
    limit: $limit
    offset: $offset
  ) {
    totalCount
    results {
      id
      createdAt
      incidentDate
      rendererData
      caseId
      gpsLocation
      reportType {
        id
        name
        category {
          id
          name
          icon
        }
      }
      reportedBy {
        username
        firstName
        lastName
        telephone
      }
      images {
        thumbnail
      }
      authorities {
        name
      }
      currentRiskAssessment {
        ...RiskAssessmentFields
      }
      testFlag
    }
  }
}

query BoundaryConnectedReports(
  $limit: Int!
  $offset: Int!
  $fromDate: DateTime
  $throughDate: DateTime
  $authorities: [ID]
  $reportTypes: [UUID]
  $testFlag: Boolean
) {
  boundaryConnectedIncidentReports(
    createdAt_Gte: $fromDate
    createdAt_Lte: $throughDate
    relevantAuthorities_Id_In: $authorities
    reportType_Id_In: $reportTypes
    testFlag: $testFlag
    limit: $limit
    offset: $offset
  ) {
    totalCount
    results {
      id
      createdAt
      incidentDate
      rendererData
      caseId
      gpsLocation
      reportType {
        id
        name
        category {
          id
          name
          icon
        }
      }
      reportedBy {
        username
        firstName
        lastName
        telephone
      }
      images {
        thumbnail
      }
      currentRiskAssessment {
        ...RiskAssessmentFields
      }
      testFlag
    }
  }
}

query GetReport($id: ID!) {
  incidentReport(id: $id) {
    id
    createdAt
    incidentDate
    gpsLocation
    updatedAt
    rendererData
    caseId
    gpsLocation
    threadId
    data
    accumulatedMetrics
    reportType {
      id
      name
      definition
      metricAccumulation
    }
    platform
    coverImage {
      id
      file
      thumbnail
    }
    images {
      id
      file
      thumbnail
      imageUrl
    }
    uploadFiles {
      id
      file
      fileType
      fileUrl
    }
    reportedBy {
      firstName
      lastName
      id
      telephone
    }
    testFlag
    definition
    authorities {
      name
    }
    currentRiskAssessment {
      ...RiskAssessmentFields
    }
    riskAssessmentHistory(limit: 3) {
      ...RiskAssessmentFields
    }
  }
}

mutation PromoteReportToCase($reportId: UUID!) {
  promoteToCase(reportId: $reportId) {
    case {
      id
    }
  }
}

mutation ConvertReportToTestReport($reportId: UUID!) {
  convertToTestReport(reportId: $reportId) {
    report {
      id
    }
  }
}

mutation SetReportRiskValue($reportId: UUID!, $level: String) {
  setReportRisk(reportId: $reportId, level: $level) {
    report {
      id
      currentRiskAssessment {
        ...RiskAssessmentFields
      }
      riskAssessmentHistory(limit: 3) {
        ...RiskAssessmentFields
      }
    }
    riskAssessment {
      ...RiskAssessmentFields
    }
  }
}
