query AdminIntegrationClients(
  $limit: Int!
  $offset: Int!
  $q: String
  $status: String
  $integrationType: String
) {
  adminIntegrationClientQuery(
    limit: $limit
    offset: $offset
    q: $q
    status: $status
    integrationType: $integrationType
  ) {
    totalCount
    results {
      id
      name
      code
      integrationType
      status
      clientId
      scopeCodes
      allowedCallbackDomains
      rateLimitPolicy
    }
  }
}

query AdminIntegrationClientGet($id: ID!) {
  adminIntegrationClientGet(id: $id) {
    id
    name
    code
    integrationType
    status
    clientId
    scopeCodes
    allowedCallbackDomains
    rateLimitPolicy
  }
}

query AdminIntegrationOptions {
  integrationScopeOptions {
    code
    label
  }
  integrationClientStatusOptions {
    code
    label
  }
  webhookEndpointStatusOptions {
    code
    label
  }
  integrationTypeOptions {
    code
    label
  }
  integrationEventTypeOptions {
    code
    label
  }
}

mutation AdminIntegrationClientCreateOp($input: AdminIntegrationClientInput!) {
  adminIntegrationClientCreate(input: $input) {
    result {
      __typename
      ... on AdminIntegrationClientCreateSuccess {
        clientSecret
        integrationClient {
          id
          name
          code
          integrationType
          status
          clientId
          scopeCodes
          allowedCallbackDomains
          rateLimitPolicy
        }
      }
      ... on AdminIntegrationClientCreateProblem {
        message
        fields {
          name
          message
        }
      }
    }
  }
}

