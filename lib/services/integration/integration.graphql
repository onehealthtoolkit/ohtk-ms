query IntegrationPolicyGet {
  integrationPolicyGet {
    integrationEnabled
    aiEnabled
    riskEvaluatorEnabled
    clusterDetectorEnabled
    aiDefaultCommentOwnerUserId
    aiDefaultCommentOwnerName
    dashboardRiskWindowDays
  }
}

query IntegrationPolicyAdminUsers($limit: Int!, $offset: Int!, $q: String) {
  adminAuthorityUserQuery(limit: $limit, offset: $offset, q: $q, role: "ADM") {
    results {
      id
      username
      firstName
      lastName
    }
  }
}

