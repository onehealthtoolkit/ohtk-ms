query AdminWebhookEndpoints(
  $limit: Int!
  $offset: Int!
  $q: String
  $integrationClientId: Decimal
  $status: String
  $eventType: String
) {
  adminWebhookEndpointQuery(
    limit: $limit
    offset: $offset
    q: $q
    integrationClientId: $integrationClientId
    status: $status
    eventType: $eventType
  ) {
    totalCount
    results {
      id
      name
      url
      status
      eventTypes
      schemaVersion
      activeSigningSecretRef
      activeSigningSecretVersion
      nextSigningSecretRef
      nextSigningSecretVersion
      timeoutSeconds
      maxAttempts
      retryPolicy
      customHeaders
      integrationClient {
        id
        code
        name
      }
    }
  }
}

